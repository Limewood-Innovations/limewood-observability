name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        # limewood-observability-db is a public sibling repo — install via
        # plain git+https, no PAT needed.
        run: |
          python -m pip install --upgrade pip
          pip install "limewood-observability-db @ git+https://github.com/Limewood-Innovations/limewood-observability-db@main"
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run pytest
        run: pytest -q --tb=short

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install ruff>=0.4
      - run: ruff check src tests
