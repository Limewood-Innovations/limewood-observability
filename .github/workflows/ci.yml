name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      # Cross-repo install of the private sibling `alpenland-observability-db`.
      # Requires an org secret OBS_DB_READ_TOKEN (fine-grained PAT with read
      # access). When the secret is missing, we skip this step — the
      # SQL-exporter tests are then auto-skipped via pytest.importorskip().
      - name: Checkout observability-db (private dep)
        if: ${{ env.HAVE_TOKEN == 'true' }}
        env:
          HAVE_TOKEN: ${{ secrets.OBS_DB_READ_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: Limewood-Innovations/alpenland-observability-db
          path: ./_deps/alpenland-observability-db
          token: ${{ secrets.OBS_DB_READ_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -d ./_deps/alpenland-observability-db ]; then
            echo "::notice::Installing alpenland-observability-db from PAT-checked-out source"
            pip install -e ./_deps/alpenland-observability-db
          else
            echo "::warning::OBS_DB_READ_TOKEN not configured — SQL-exporter tests will be skipped."
          fi
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run pytest
        run: pytest -q --tb=short

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install ruff>=0.4
      - run: ruff check src tests
